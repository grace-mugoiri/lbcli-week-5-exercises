name: Run Setup Script

on:
  push:
    branches:
      - main  # Trigger on pushes to the main branch

jobs:
  bitcoin-setup:
    runs-on: ubuntu-latest  # Use the latest Ubuntu environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Check out the repository code

      - name: Cache Bitcoin Core
        id: cache-bitcoin
        uses: actions/cache@v3
        with:
          path: |
            bitcoin-28.0
            bitcoin-28.0-x86_64-linux-gnu.tar.gz
          key: bitcoin-core-28.0
          
      - name: Setup Bitcoin Core
        run: |
          if [ "${{ steps.cache-bitcoin.outputs.cache-hit }}" != 'true' ]; then
            wget https://bitcoincore.org/bin/bitcoin-core-28.0/bitcoin-28.0-x86_64-linux-gnu.tar.gz
            tar -xzvf bitcoin-28.0-x86_64-linux-gnu.tar.gz
          fi
          sudo bash .github/setup.sh

      - name: Start bitcoind in regtest mode
        run: |
          bitcoind -regtest -daemon
          echo "Waiting for bitcoind to be ready..."

          # Wait for bitcoind to start (max 30s)
          for i in {1..30}; do
            if bitcoin-cli -regtest getblockchaininfo > /dev/null 2>&1; then
              echo "✅ bitcoind is ready!"
              break
            fi
            echo "Still waiting for bitcoind..."
            sleep 1
          done

      - name: 01.sh - Verify Wallet Creation
        run: |
            chmod +x submission/01.sh
            WALLET=$(submission/01.sh)
            if [[ "$WALLET" == *"btrustwallet"* ]]; then
              echo "✅ Success: Wallet creation passed!"
            else
              echo "❌ Error: Wallet creation failed!"
              exit 1
            fi

      - name: 02.sh - Verify Redeem Script
        run: |
          actual_sha() { printf '%s' "$1" | sha256sum | awk '{print $1}'; }
          chmod +x submission/02.sh
          SCRIPT=$(submission/02.sh)
          EXPECTED_SHA=371580cfc5169fedc89930dc449c55414cca3d5b528372ecbc8eadf43fa772fd
          if [[ "$(actual_sha "$SCRIPT")" == "$EXPECTED_SHA" ]]; then
            echo "✅ Success: Redeem Script verification passed!"
          else
            echo "❌ Error: Redeem Script verification failed!"
            exit 1
          fi
      
      - name: 03.sh - Verify P2SH Segwit Script
        run: |
          actual_sha() { printf '%s' "$1" | sha256sum | awk '{print $1}'; }
          chmod +x submission/03.sh
          SCRIPT=$(submission/03.sh)
          EXPECTED_SHA=7050116588bb8837d0631547915ffc53a6a65f1d348024fc4cbe3c6c2e57136a
          if [[ "$(actual_sha "$SCRIPT")" == "$EXPECTED_SHA" ]]; then
            echo "✅ Success: P2SH Segwit Script verification passed!"
          else
            echo "❌ Error: P2SH Segwit Script verification failed!"
            exit 1
          fi
          
      - name: 04.sh - Verify CLTV Script
        run: |
          actual_sha() { printf '%s' "$1" | sha256sum | awk '{print $1}'; }
          chmod +x submission/04.sh
          SCRIPT=$(submission/04.sh)
          EXPECTED_SHA=9a04df80fbb0cead60b8f836072142763064173bffd3b5d7eabe03b01e184818
          if [[ "$(actual_sha "$SCRIPT")" == "$EXPECTED_SHA" ]]; then
            echo "✅ Success: CLTV Script verification passed!"
          else
            echo "❌ Error: CLTV Script verification failed!"
            exit 1
          fi
      
      - name: 05.sh - Verify CSV Script
        run: |
          actual_sha() { printf '%s' "$1" | sha256sum | awk '{print $1}'; }
          chmod +x submission/05.sh
          SCRIPT=$(submission/05.sh)
          EXPECTED_SHA=1e5b747170d8c17ee1ad8dcaaaf454afbe3d6f2e39a7518bc24866503ca7cbb6
          if [[ "$(actual_sha "$SCRIPT")" == "$EXPECTED_SHA" ]]; then
            echo "✅ Success: CSV Script verification passed!"
          else
            echo "❌ Error: CSV Script verification failed!"
            exit 1
          fi

      - name: 06.sh - Verify P2SH Address from Redeem Script
        run: |
          actual_sha() { printf '%s' "$1" | sha256sum | awk '{print $1}'; }
          chmod +x submission/06.sh
          RESULT=$(submission/06.sh)
          EXPECTED_SHA=00a751933601c8185d489f70098e23e057edb51eef7038e8a4abc8d9d3e9f280
          if [[ "$(actual_sha "$RESULT")" == "$EXPECTED_SHA" ]]; then
            echo "✅ Success: P2SH Address verification passed!"
          else
            echo "❌ Error: P2SH Address verification failed!"
            exit 1
          fi

      - name: 07.sh - Verify 2-of-3 Multisig Redeem Script
        run: |
          actual_sha() { printf '%s' "$1" | sha256sum | awk '{print $1}'; }
          chmod +x submission/07.sh
          SCRIPT=$(submission/07.sh)
          EXPECTED_SHA=c3b078c65f4cc6cad019ca080be104bc8d0f106112c7e66d43f575e205cf13d0
          if [[ "$(actual_sha "$SCRIPT")" == "$EXPECTED_SHA" ]]; then
            echo "✅ Success: 2-of-3 Multisig Redeem Script verification passed!"
          else
            echo "❌ Error: 2-of-3 Multisig Redeem Script verification failed!"
            exit 1
          fi

      - name: 08.sh - Verify Time-based CSV Script
        run: |
          actual_sha() { printf '%s' "$1" | sha256sum | awk '{print $1}'; }
          chmod +x submission/08.sh
          SCRIPT=$(submission/08.sh)
          EXPECTED_SHA=5d001aabf113d96cc1222ee02ff96e2a876eea195a9a1dae6cbc08c04f86b2f4
          if [[ "$(actual_sha "$SCRIPT")" == "$EXPECTED_SHA" ]]; then
            echo "✅ Success: Time-based CSV Script verification passed!"
          else
            echo "❌ Error: Time-based CSV Script verification failed!"
            exit 1
          fi
